name: Retarget Dependabot Security PRs to DMZ

# Dependabot security updates always target the default branch (main) and this
# cannot be changed via dependabot.yml.  This workflow automatically retargets
# those PRs to the dmz branch so they follow the DMZ git-flow used by this repo.

on:
  pull_request_target:
    types: [opened]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  retarget:
    name: Retarget to DMZ Branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2

      - name: Retarget PR from main to dmz
        run: |
          echo "Retargeting Dependabot security PR #$PR_NUMBER from main to dmz..."
          gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --base dmz
          echo "Successfully retargeted PR #$PR_NUMBER to dmz branch."
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add explanatory comment
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "**Automatically retargeted to \`dmz\`**

          This Dependabot security update was opened against \`main\` (GitHub enforces this for security PRs). It has been retargeted to \`dmz\` to follow the [DMZ git-flow](.github/DMZ-WORKFLOW.md) used by this repository.

          Please review and merge into \`dmz\` as usual. The changes will reach \`main\` during the next scheduled dmz-to-main integration."
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
